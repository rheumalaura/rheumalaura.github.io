<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta name="description" content="{{ site.description }}">
<meta name="keywords" content="reumatologia, reumatologa Padova, reumatologa Venezia, rheumatology specialist, connective tissue diseases, inflammatory arthritis, Veneto">
<meta name="author" content="Dr.ssa Laura Scagnellato">
<!-- Open Graph (for sharing on WhatsApp, LinkedIn etc.) -->
<meta property="og:title" content="{{ site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:image" content="https://raw.githubusercontent.com/rheumalaura/rheumalaura.github.io/main/LOGO_LS.png">
<meta property="og:url" content="https://rheumalaura.github.io">
<meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha256-ZosEbRLbNQzLpnKIkEdrPv7lOy9C27hHQ+Xp8a4MxAQ=" crossorigin="anonymous"></script>
    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
    <style>
      /* Center all main content */
      .main-content {
        text-align: center;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }

      /* Keep lists left-aligned for readability */
      .main-content ul {
        display: inline-block;
        text-align: left;
      }

      /* Center the expertise tags */
      .main-content div[style] {
        justify-content: center;
      }

      /* Logo responsive */
      .page-header img {
        max-width: 320px;
        width: 75%;
        height: auto;
      }

      /* Headings spacing */
      .main-content h2 {
        margin-top: 2em;
      }

      /* Mobile tweaks */
      @media (max-width: 600px) {
        .main-content {
          padding: 12px;
          font-size: 0.97em;
        }
        .page-header img {
          width: 60%;
        }
      }
    </style>
  </head>
  <body>
    <section class="page-header">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/LOGO_LS.png' | relative_url }}" 
             alt="Dr.ssa Laura Scagnellato" 
             style="max-width: 320px; width: 75%;">
      </a>
      <p class="project-tagline">{{ site.description }}</p>
    </section>

    <section class="main-content">
      {{ content }}
      <footer class="site-footer">
        <span class="site-footer-credits">
          <a href="{{ site.github.repository_url }}" class="code">View on GitHub</a>
        </span>
      </footer>
    </section>

    <div class="current-section">
      <a href="#top">Scroll to top</a>
      <p class="name"></p>
    </div>
  </body>
</html>
